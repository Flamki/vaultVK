name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

  docker-cluster-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start cluster
        run: docker compose up -d --build

      - name: Quorum demo
        run: bash scripts/quorum_demo.sh

      - name: Cluster status
        if: always()
        run: docker compose ps

      - name: Node logs
        if: always()
        run: docker compose logs --no-color --tail=200

      - name: Shutdown
        if: always()
        run: docker compose down -v

